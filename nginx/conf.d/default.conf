# Placeholders __LISTEN_PORT__ and __API_PORT__ are replaced at container start
# (docker-entrypoint.d/25-sed-nginx-ports.sh). No envsubst — avoids $$ mangling.
server {
    listen __LISTEN_PORT__;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://api:__API_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    include /etc/nginx/snippets/spa.conf;
}
